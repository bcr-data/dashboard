<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ponto BCR.CX</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a2332;font-size:14px}
:root{--blue1:#1565C0;--blue2:#1976D2;--blue3:#2196F3;--blue4:#64B5F6;--blue5:#E3F2FD;--dark:#1a2332;--mid:#455a64;--light:#78909c;--border:#e0e8f0}
.header{background:var(--blue1);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.logo-wrap{background:#fff;border-radius:10px;padding:6px 12px;display:flex;align-items:center;gap:8px}
.header-title{flex:1;text-align:center}.header-title h1{font-size:20px;font-weight:600}.header-title p{font-size:12px;opacity:.8;margin-top:2px}
.header-meta{font-size:12px;text-align:right;opacity:.85;min-width:160px}
.filters{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:150px}
.filter-group label{font-size:11px;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.5px}
.filter-group select,.filter-group input[type=date]{border:1.5px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;color:var(--dark);background:#fff;outline:none}
.filter-group select:hover,.filter-group input[type=date]:hover{border-color:var(--blue3)}
.btn-filter{background:var(--blue2);color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:13px;cursor:pointer;font-weight:600;height:33px}
.btn-reset{background:transparent;color:var(--mid);border:1.5px solid var(--border);border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer;height:33px}
.main{padding:20px 24px;display:flex;flex-direction:column;gap:18px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.kpi{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--blue2)}
.kpi-val{font-size:26px;font-weight:700;color:var(--dark);line-height:1}
.kpi-label{font-size:11px;color:var(--light);margin-top:6px;text-transform:uppercase;letter-spacing:.4px}
.kpi-sub{font-size:11px;color:var(--mid);margin-top:3px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-card{background:#fff;border-radius:10px;padding:18px;border:1px solid var(--border)}
.chart-card.full{grid-column:1/-1}
.bar-accent{width:4px;height:16px;background:var(--blue2);border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:13px;font-weight:700;color:var(--dark);display:flex;align-items:center;gap:4px}
.toggle-group{display:flex;border:1.5px solid var(--border);border-radius:6px;overflow:hidden}
.toggle-btn{background:#fff;border:none;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--mid);font-weight:500}
.toggle-btn:not(:last-child){border-right:1px solid var(--border)}
.toggle-btn.active{background:var(--blue2);color:#fff}
.legend-row{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;font-size:12px;color:var(--mid)}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}
.funnel-card{background:#fff;border-radius:10px;padding:18px;border:1px solid var(--border)}
.funnel-wrap{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.funnel-level-title{font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.funnel-bar-row{display:flex;align-items:center;gap:10px;padding:4px 6px;border-radius:6px;transition:background .12s}
.funnel-bar-row:hover{background:var(--blue5)}
.funnel-label{font-size:12px;color:var(--dark);min-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.funnel-bar-bg{flex:1;height:18px;background:#e0e8f0;border-radius:4px;overflow:hidden}
.funnel-bar-fill{height:100%;border-radius:4px;background:var(--blue2);transition:width .3s}
.funnel-bar-fill.warn{background:#f57c00}.funnel-bar-fill.danger{background:#c62828}
.funnel-pct{font-size:12px;font-weight:700;color:var(--dark);min-width:52px;text-align:right}
.funnel-breadcrumb{font-size:12px;color:var(--mid);margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.funnel-breadcrumb span{color:var(--blue2);cursor:pointer;font-weight:600}
.funnel-hint{font-size:11px;color:var(--light);margin-top:8px;font-style:italic}
.table-card{background:#fff;border-radius:10px;padding:18px;border:1px solid var(--border)}
.table-wrap{overflow-x:auto;max-height:320px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;background:var(--blue5);color:var(--blue1);font-weight:700;padding:8px 10px;text-align:left;border-bottom:2px solid var(--blue4);font-size:11px;text-transform:uppercase;cursor:pointer;white-space:nowrap}
thead th:hover{background:#d0e8fb}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:hover{background:var(--blue5)}
tbody td{padding:7px 10px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-ok{background:#e8f5e9;color:#2e7d32}.badge-warn{background:#fff3e0;color:#e65100}.badge-danger{background:#ffebee;color:#c62828}
.abs-bar{display:flex;align-items:center;gap:6px}
.abs-bar-bg{flex:1;height:6px;background:#e0e8f0;border-radius:3px;overflow:hidden;min-width:60px}
.abs-bar-fill{height:100%;border-radius:3px;background:var(--blue3)}
.abs-bar-fill.warn{background:#f57c00}.abs-bar-fill.danger{background:#c62828}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--mid);font-size:15px}
.spinner{width:28px;height:28px;border:3px solid var(--blue5);border-top-color:var(--blue2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#ffebee;border:1px solid #ef9a9a;border-radius:8px;padding:16px 20px;color:#c62828;font-size:13px;margin:20px 24px}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1565C0 0%,#1976D2 50%,#2196F3 100%)}
.login-card{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.login-logo{display:flex;justify-content:center;margin-bottom:28px}
.login-logo img{height:44px;width:auto}
.login-title{font-size:20px;font-weight:700;color:var(--dark);text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--light);text-align:center;margin-bottom:28px}
.login-field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.login-field label{font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.5px}
.login-field input{border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--dark);outline:none;transition:border-color .15s}
.login-field input:focus{border-color:var(--blue2)}
.btn-login{width:100%;background:var(--blue2);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s}
.btn-login:hover{background:var(--blue1)}
.btn-login:disabled{background:var(--blue4);cursor:not-allowed}
.login-error{background:#ffebee;border:1px solid #ef9a9a;border-radius:6px;padding:10px 14px;color:#c62828;font-size:13px;margin-top:12px;display:none}
.login-spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
/* USER CHIP */
.user-chip{display:flex;align-items:center;gap:8px;font-size:12px;opacity:.9}
.user-chip span{opacity:.8}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;transition:background .15s}
.btn-logout:hover{background:rgba(255,255,255,.25)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="./logo.png" alt="BCR.CX">
    </div>
    <div class="login-title">Dashboard de Ponto</div>
    <div class="login-sub">Acesso restrito — entre com suas credenciais</div>
    <div class="login-field">

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="header">
  <div class="logo-wrap">
    <img src="./logo.png" alt="BCR.CX" style="height:36px;width:auto;">
  </div>
  <div class="header-title">
    <h1>Dashboard de Ponto — Absenteísmo</h1>

<div class="filters" id="filters-bar" style="display:none">

</div><!-- /dashboard -->

<script>
document.addEventListener('DOMContentLoaded', function() {

const SB_URL = 'https://toeelbrxxnlkvxkhewnw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvZWVsYnJ4eG5sa3Z4a2hld253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDI0NjUsImV4cCI6MjA5NTM3ODQ2NX0.7wYOQzcEOGlYlSG0cmSZDcwaH-dV5XjtVvBr_k4WdJE';
const TABLE  = 'absenteeism';
const PAGE   = 5000;

// Supabase client
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('btn-login');
  const label    = document.getElementById('login-label');
  const spinner  = document.getElementById('login-spinner');

  errEl.style.display = 'none';
  if(!email || !password){ errEl.textContent='Preencha e-mail e senha.'; errEl.style.display='block'; return; }

  btn.disabled = true; label.style.display='none'; spinner.style.display='block';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  btn.disabled = false; label.style.display='block'; spinner.style.display='none';

  if(error){
    errEl.textContent = error.message.includes('Invalid login') ? 'E-mail ou senha incorretos.' : error.message;
    errEl.style.display = 'block';
    return;
  }
  showDashboard(data.user);
}

async function doLogout() {
  await supabase.auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div>Buscando dados do Supabase...</div>';
}

function showDashboard(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('user-email-display').textContent = user.email;
  init();
}

// Button + Enter key listeners
document.getElementById('btn-login').addEventListener('click', doLogin);
['login-email','login-password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
});

// Check existing session on load
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if(session) {
    showDashboard(session.user);
  }
})();
// ─────────────────────────────────────────────────────────────────────────────

const parseTime  = t => { if(!t||t==='00:00')return 0; const[h,m]=t.split(':'); return+h+(+m/60); };
const allLeaders = l => l ? l.split(',').map(x=>x.trim()).filter(Boolean) : ['N/A'];
const monthKey   = d => d.slice(0,7);
const monthLabel = k => { const[y,m]=k.split('-'); return `${'JanFevMarAbrMaiJunJulAgoSetOutNovDez'.slice((+m-1)*3,(+m-1)*3+3)}/${y.slice(2)}`; };
const groupBy    = (arr,key) => arr.reduce((a,r)=>{ (a[r[key]]=a[r[key]]||[]).push(r); return a; },{});

const dedupeRows = rows => {
  const seen = new Set();
  return rows.filter(r => {
    const key = r.name+'|'+r.date;
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
};

const calcAbs = rows => {
  const u = dedupeRows(rows);
  const p = u.reduce((s,r)=>s+r.previsto,0);
  const a = u.reduce((s,r)=>s+r.ausencia,0);
  return p>0?+(a/p*100).toFixed(2):0;
};

let allData=[], filteredData=[], sortDir={};
let loadedDateStart='', loadedDateEnd='';
let absMode='team', hoursMode='team', trendMode='team', trendDrillMonth=null, funnelRoot='supervisor', funnelPath=[];
let chartAbs=null, chartHours=null, chartTrend=null;
let tablePage=0;
const TABLE_PAGE_SIZE=100;

async function fetchAll(dateStart, dateEnd) {
  let rows=[], offset=0, total=null;
  const { data: { session } } = await supabase.auth.getSession();
  const token = session ? session.access_token : SB_KEY;
  while(true) {
    const headers = { apikey:SB_KEY, Authorization:`Bearer ${token}`, Range:`${offset}-${offset+PAGE-1}`, Prefer:'count=exact' };
    let url = `${SB_URL}/rest/v1/${TABLE}?select=*&order=extraction_date.asc`;
    if(dateStart) url += `&extraction_date=gte.${dateStart}`;
    if(dateEnd)   url += `&extraction_date=lte.${dateEnd}`;
    const res = await fetch(url, { headers });
    if(!res.ok) throw new Error(`Supabase error: ${res.status} ${res.statusText}`);
    if(total===null){ const cr=res.headers.get('Content-Range'); if(cr) total=parseInt(cr.split('/')[1])||null; }
    const page = await res.json();
    rows.push(...page);
    if(total!==null && rows.length>=total) break;
    if(page.length<PAGE) break;
    offset+=PAGE;
  }
  return rows;
}

function processRows(rows) {
  allData = [];
  for(const r of rows) {
    const prev = parseTime(r.total_working_time);
    const trab = parseTime(r.total_worked_time);
    const aus  = parseTime(r.total_missing_time);
    allLeaders(r.leaders).forEach(sup => {
      allData.push({
        name:r.name, team:r.cost_center, supervisor:sup,
        date:r.extraction_date, month:monthKey(r.extraction_date),
        previsto:prev, trabalhado:trab, ausencia:aus
      });
    });
  }
}

async function init() {
  const today=new Date(), y=today.getFullYear(), m=String(today.getMonth()+1).padStart(2,'0');
  const past30=new Date(today); past30.setDate(past30.getDate()-30);
  const py=past30.getFullYear(), pm=String(past30.getMonth()+1).padStart(2,'0'), pd=String(past30.getDate()).padStart(2,'0');
  const defaultStart=`${py}-${pm}-${pd}`, defaultEnd=today.toISOString().slice(0,10);
  try {
    const rows = await fetchAll(defaultStart, defaultEnd);
    processRows(rows);
    if(!allData.length){ showError('Nenhum registro encontrado para o período selecionado.'); return; }
    filteredData=[...allData];
    loadedDateStart=defaultStart; loadedDateEnd=defaultEnd;
    document.getElementById('f-date-start').value=defaultStart;
    document.getElementById('f-date-end').value=defaultEnd;
    document.getElementById('filters-bar').style.display='flex';
    populateFilters(); buildLayout(); renderAll();
  } catch(e){ showError(`Erro ao conectar ao Supabase: ${e.message}`); }
}

async function applyFilters() {
  const sup=document.getElementById('f-sup').value, team=document.getElementById('f-team').value,
        emp=document.getElementById('f-emp').value, ds=document.getElementById('f-date-start').value,
        de=document.getElementById('f-date-end').value;

  if(ds!==loadedDateStart || de!==loadedDateEnd) {
    document.getElementById('app').innerHTML='<div class="loading"><div class="spinner"></div>Atualizando...</div>';
    try {
      const rows=await fetchAll(ds,de);
      processRows(rows);
      loadedDateStart=ds; loadedDateEnd=de;
      funnelPath=[]; populateFilters(sup,team,emp); buildLayout();
    } catch(e){ showError(`Erro ao buscar dados: ${e.message}`); return; }
  }

  filteredData=allData.filter(d=>{
    if(sup  && d.supervisor!==sup)  return false;
    if(team && d.team!==team)       return false;
    if(emp  && d.name!==emp)        return false;
    return true;
  });
  funnelPath=[]; renderAll();
}

function resetFilters() {
  ['f-sup','f-team','f-emp'].forEach(id=>document.getElementById(id).value='');
  const today=new Date(), y=today.getFullYear(), m=String(today.getMonth()+1).padStart(2,'0');
  document.getElementById('f-date-start').value=`${y}-${m}-01`;
  document.getElementById('f-date-end').value=today.toISOString().slice(0,10);
  applyFilters();
}

function populateFilters(selSup='',selTeam='',selEmp='') {
  const fill=(id,opts,ph,sel)=>{
    const s=document.getElementById(id);
    s.innerHTML=`<option value="">${ph}</option>`;
    opts.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; if(v===sel)o.selected=true; s.appendChild(o); });
  };
  fill('f-sup',  [...new Set(allData.map(d=>d.supervisor))].sort(),'Todos os supervisores',selSup);
  fill('f-team', [...new Set(allData.map(d=>d.team))].sort(),      'Todas as equipes',     selTeam);
  fill('f-emp',  [...new Set(allData.map(d=>d.name))].sort(),      'Todos',                selEmp);
}

function buildLayout() {
  document.getElementById('app').innerHTML=`
    <div class="main">
      <div class="kpi-row" id="kpi-row"></div>
      <div class="charts-row">
        <div class="chart-card full">
          <div class="card-header">
            <div class="card-title"><span class="bar-accent"></span><span id="trend-title">Evolução — ABS (%) por Equipe — Top 10 maiores</span></div>
            <div style="display:flex;align-items:center;gap:10px">
              <div id="trend-breadcrumb" style="font-size:12px;color:var(--mid)"></div>
              <div class="toggle-group">
                <button class="toggle-btn active" id="trend-btn-team" onclick="setTrendMode('team')">Equipe</button>
                <button class="toggle-btn" id="trend-btn-emp" onclick="setTrendMode('emp')">Colaborador</button>
              </div>
            </div>
          </div>
          <div class="legend-row" id="trend-legend"></div>
          <div style="position:relative;height:260px"><canvas id="chartTrend"></canvas></div>
          <div style="font-size:11px;color:var(--light);margin-top:6px;font-style:italic" id="trend-hint">Clique em um mês para ver a evolução diária</div>
        </div>
      </div>
      <div class="charts-row">
        <div class="chart-card">
          <div class="card-header">
            <div class="card-title"><span class="bar-accent"></span><span id="abs-chart-title">ABS (%) por equipe</span></div>
            <div class="toggle-group">
              <button class="toggle-btn active" id="abs-btn-team" onclick="setAbsMode('team')">Equipe</button>
              <button class="toggle-btn" id="abs-btn-emp" onclick="setAbsMode('emp')">Colaborador</button>
            </div>
          </div>
          <div class="legend-row">
            <span><span class="legend-dot" style="background:#1976D2"></span>ABS %</span>
            <span><span class="legend-dot" style="background:#f57c00"></span>Meta 3%</span>
          </div>
          <div style="max-height:320px;overflow-y:auto;"><div style="position:relative;" id="chart-abs-wrap"><canvas id="chartAbs"></canvas></div></div>
        </div>
        <div class="chart-card">
          <div class="card-header">
            <div class="card-title"><span class="bar-accent"></span><span id="hours-chart-title">Previsto vs trabalhado — equipe</span></div>
            <div class="toggle-group">
              <button class="toggle-btn active" id="hours-btn-team" onclick="setHoursMode('team')">Equipe</button>
              <button class="toggle-btn" id="hours-btn-emp" onclick="setHoursMode('emp')">Colaborador</button>
            </div>
          </div>
          <div class="legend-row">
            <span><span class="legend-dot" style="background:#1976D2"></span>Previsto</span>
            <span><span class="legend-dot" style="background:#90CAF9"></span>Trabalhado</span>
          </div>
          <div style="max-height:320px;overflow-y:auto;"><div style="position:relative;" id="chart-hours-wrap"><canvas id="chartHours"></canvas></div></div>
        </div>
      </div>
      <div class="funnel-card">
        <div class="card-header">
          <div class="card-title"><span class="bar-accent"></span>ABS % — Drill Down</div>
          <div class="toggle-group">
            <button class="toggle-btn active" id="fn-btn-supervisor" onclick="setFunnelRoot('supervisor')">Supervisor</button>
            <button class="toggle-btn" id="fn-btn-team" onclick="setFunnelRoot('team')">Equipe</button>
            <button class="toggle-btn" id="fn-btn-name" onclick="setFunnelRoot('name')">Colaborador</button>
          </div>
        </div>
        <div class="funnel-breadcrumb" id="funnel-breadcrumb"></div>
        <div class="funnel-wrap" id="funnel-wrap"></div>
        <div class="funnel-hint" id="funnel-hint">Clique em uma barra para detalhar</div>
      </div>
      <div class="table-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="card-title"><span class="bar-accent"></span>Detalhamento por colaborador / dia</div>
          <button class="btn-filter" onclick="exportCSV()">⬇ Exportar CSV</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th onclick="sortTable(0)">Colaborador ↕</th>
              <th onclick="sortTable(1)">Equipe ↕</th>
              <th onclick="sortTable(2)">Supervisor ↕</th>
              <th onclick="sortTable(3)">Data ↕</th>
              <th onclick="sortTable(4)">Mês ↕</th>
              <th onclick="sortTable(5)">Previsto ↕</th>
              <th onclick="sortTable(6)">Trabalhado ↕</th>
              <th onclick="sortTable(7)">Ausência ↕</th>
              <th onclick="sortTable(8)">ABS % ↕</th>
            </tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--mid)">
          <span id="table-info"></span>
          <div style="display:flex;gap:8px">
            <button class="btn-reset" id="btn-prev" onclick="tablePageChange(-1)">‹ Anterior</button>
            <button class="btn-reset" id="btn-next" onclick="tablePageChange(1)">Próximo ›</button>
          </div>
        </div>
      </div>
    </div>`;
  chartAbs=null; chartHours=null; chartTrend=null;
}

function renderAll(){ renderKPIs(); renderTrendChart(); renderChartAbs(); renderChartHours(); renderFunnel(); renderTableBody(); }

function renderKPIs(){
  const d=dedupeRows(filteredData);
  const totP=d.reduce((s,r)=>s+r.previsto,0), totT=d.reduce((s,r)=>s+r.trabalhado,0), totA=d.reduce((s,r)=>s+r.ausencia,0);
  const absG=totP>0?(totA/totP*100):0, pct=totP>0?(totT/totP*100):0;
  const kpis=[
    {label:'Colaboradores',val:new Set(filteredData.map(r=>r.name)).size,sub:'no período'},
    {label:'Total previsto',val:totP.toFixed(0)+'h',sub:'horas esperadas'},
    {label:'Total trabalhado',val:totT.toFixed(0)+'h',sub:pct.toFixed(1)+'% do previsto'},
    {label:'Total ausências',val:totA.toFixed(1)+'h',sub:'horas faltantes'},
    {label:'ABS Global',val:absG.toFixed(2)+'%',sub:'índice de absenteísmo'},
    {label:'Reg. c/ falta',val:d.filter(r=>r.ausencia>0).length,sub:'registros com ausência'},
  ];
  document.getElementById('kpi-row').innerHTML=kpis.map(k=>`<div class="kpi"><div class="kpi-val">${k.val}</div><div class="kpi-label">${k.label}</div><div class="kpi-sub">${k.sub}</div></div>`).join('');
}

function setTrendMode(m){
  trendMode=m; trendDrillMonth=null;
  document.getElementById('trend-btn-team').classList.toggle('active',m==='team');
  document.getElementById('trend-btn-emp').classList.toggle('active',m==='emp');
  document.getElementById('trend-title').textContent=m==='team'
    ?'Evolução — ABS (%) por Equipe — Top 10 maiores'
    :'Evolução — ABS (*) por Colaborador — Top 10 maiores';
  renderTrendChart();
}

function renderTrendChart(){
  const groupKey=trendMode==='team'?'team':'name';
  const colors=['#1565C0','#D32F2F','#2E7D32','#F57C00','#6A1B9A','#00838F','#AD1457','#4E342E','#37474F','#558B2F'];
  let labels,datasets,hint='',breadcrumb='';

  if(trendDrillMonth){
    const dayData=filteredData.filter(d=>d.month===trendDrillMonth);
    const days=[...new Set(dayData.map(d=>d.date))].sort();
    const groups=Object.entries(groupBy(dayData,groupKey)).map(([k,v])=>({k,abs:calcAbs(v)})).sort((a,b)=>b.abs-a.abs).slice(0,10).map(x=>x.k);
    labels=days.map(d=>{ const[,mo,dy]=d.split('-'); return `${dy}/${mo}`; });
    datasets=groups.map((g,i)=>({
      label:g, borderColor:colors[i%10], backgroundColor:colors[i%10],
      borderWidth:2.5, pointRadius:4, fill:false, tension:.3, spanGaps:true,
      data:days.map(day=>{ const r=dayData.filter(x=>x[groupKey]===g&&x.date===day); return r.length?calcAbs(r):null; })
    }));
    breadcrumb=`${monthLabel(trendDrillMonth)} › dias`;
    hint='Clique aqui para voltar para o mês';
    document.getElementById('trend-hint').onclick=()=>{ trendDrillMonth=null; renderTrendChart(); };
  } else {
    const months=[...new Set(filteredData.map(d=>d.month))].sort();
    const groups=Object.entries(groupBy(filteredData,groupKey)).map(([k,v])=>({k,abs:calcAbs(v)})).sort((a,b)=>b.abs-a.abs).slice(0,10).map(x=>x.k);
    labels=months.map(monthLabel);
    datasets=groups.map((g,i)=>({
      label:g, borderColor:colors[i%10], backgroundColor:colors[i%10],
      borderWidth:2.5, pointRadius:5, fill:false, tension:.3, spanGaps:true,
      data:months.map(mo=>{ const r=filteredData.filter(d=>d[groupKey]===g&&d.month===mo); return r.length?calcAbs(r):null; })
    }));
    hint='Clique em um ponto para ver a evolução diária';
    document.getElementById('trend-hint').onclick=null;
  }

  document.getElementById('trend-breadcrumb').textContent=breadcrumb;
  document.getElementById('trend-hint').textContent=hint;
  document.getElementById('trend-legend').innerHTML=datasets.map((d,i)=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:18px;height:3px;background:${colors[i%10]};display:inline-block;border-radius:2px"></span><span style="font-size:12px;color:var(--mid)">${d.label}</span></span>`).join('');

  if(chartTrend)chartTrend.destroy();
  chartTrend=new Chart(document.getElementById('chartTrend'),{
    type:'line', data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      onClick:(evt,els)=>{ if(!trendDrillMonth&&els.length){ const months=[...new Set(filteredData.map(d=>d.month))].sort(); trendDrillMonth=months[els[0].index]; renderTrendChart(); } },
      scales:{ y:{title:{display:true,text:'ABS %'},min:0,grid:{color:'#f0f4f8'},ticks:{callback:v=>v+'%'}}, x:{grid:{color:'#f0f4f8'}} }
    }
  });
}

function setAbsMode(m){
  absMode=m;
  document.getElementById('abs-btn-team').classList.toggle('active',m==='team');
  document.getElementById('abs-btn-emp').classList.toggle('active',m==='emp');
  document.getElementById('abs-chart-title').textContent=m==='team'?'ABS (%) por equipe':'ABS (%) por colaborador';
  renderChartAbs();
}

function renderChartAbs(){
  const key=absMode==='team'?'team':'name';
  const e=Object.entries(groupBy(filteredData,key)).map(([k,v])=>({k,abs:calcAbs(v)})).sort((a,b)=>b.abs-a.abs);
  const labels=e.map(x=>absMode==='emp'?x.k.split(' ').slice(0,2).join(' '):x.k);
  const vals=e.map(x=>x.abs);
  const colors=vals.map(v=>v>=5?'#c62828':v>=3?'#f57c00':'#1976D2');
  const wrap=document.getElementById('chart-abs-wrap');
  wrap.style.height=Math.max(200,labels.length*(absMode==='emp'?20:30)+60)+'px';
  if(chartAbs)chartAbs.destroy();
  chartAbs=new Chart(document.getElementById('chartAbs'),{type:'bar',data:{labels,datasets:[{label:'ABS %',data:vals,backgroundColor:colors,borderRadius:4},{label:'Meta 3%',data:labels.map(()=>3),type:'line',borderColor:'#f57c00',borderWidth:2,borderDash:[6,3],pointRadius:0,fill:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#f0f4f8'}},y:{grid:{display:false},ticks:{font:{size:absMode==='emp'?10:12}}}}}});
}

function setHoursMode(m){
  hoursMode=m;
  document.getElementById('hours-btn-team').classList.toggle('active',m==='team');
  document.getElementById('hours-btn-emp').classList.toggle('active',m==='emp');
  document.getElementById('hours-chart-title').textContent=m==='team'?'Previsto vs trabalhado — equipe':'Previsto vs trabalhado — colaborador';
  renderChartHours();
}

function renderChartHours(){
  const key=hoursMode==='team'?'team':'name';
  const e=Object.entries(groupBy(filteredData,key)).map(([k,v])=>{
    const u=dedupeRows(v);
    return {k, prev:u.reduce((s,r)=>s+r.previsto,0), trab:u.reduce((s,r)=>s+r.trabalhado,0), abs:calcAbs(v)};
  }).sort((a,b)=>b.abs-a.abs);
  const labels=e.map(x=>hoursMode==='emp'?x.k.split(' ').slice(0,2).join(' '):x.k);
  const prev=e.map(x=>+x.prev.toFixed(1)), trab=e.map(x=>+x.trab.toFixed(1));
  const wrap=document.getElementById('chart-hours-wrap');
  wrap.style.height=Math.max(200,labels.length*(hoursMode==='emp'?20:30)+60)+'px';
  if(chartHours)chartHours.destroy();
  chartHours=new Chart(document.getElementById('chartHours'),{type:'bar',data:{labels,datasets:[{label:'Previsto',data:prev,backgroundColor:'#1976D2',borderRadius:3},{label:'Trabalhado',data:trab,backgroundColor:'#90CAF9',borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#f0f4f8'}},y:{grid:{display:false},ticks:{font:{size:hoursMode==='emp'?10:12}}}}}});
}

function setFunnelRoot(r){
  funnelRoot=r; funnelPath=[];
  ['supervisor','team','name'].forEach(k=>document.getElementById('fn-btn-'+k).classList.toggle('active',r===k));
  renderFunnel();
}

function renderFunnel(){
  let rows=filteredData;
  funnelPath.forEach(s=>{ rows=rows.filter(r=>r[s.key]===s.val); });
  const depth=funnelPath.length;
  let levelLabel,items;
  if(funnelRoot==='supervisor'){
    if(depth===0){levelLabel='Supervisor';items=getItems(rows,'supervisor');}
    else if(depth===1){levelLabel='Equipe';items=getItems(rows,'team');}
    else{levelLabel='Colaborador';items=getItems(rows,'name');}
  } else if(funnelRoot==='team'){
    if(depth===0){levelLabel='Equipe';items=getItems(rows,'team');}
    else{levelLabel='Colaborador';items=getItems(rows,'name');}
  } else {
    levelLabel='Colaborador'; items=getItems(rows,'name');
  }
  const maxAbs=Math.max(...items.map(i=>i.abs),0.01);
  const canDrill=(funnelRoot==='supervisor'&&depth<2)||(funnelRoot==='team'&&depth<1);
  const bc=document.getElementById('funnel-breadcrumb');
  bc.innerHTML='<span onclick="drillUp(-1)">Início</span>';
  funnelPath.forEach((s,i)=>{ bc.innerHTML+=` › <span onclick="drillUp(${i})">${s.val}</span>`; });
  if(funnelPath.length) bc.innerHTML+=` › <strong>${levelLabel}</strong>`;
  document.getElementById('funnel-wrap').innerHTML=`<div class="funnel-level-title">${levelLabel}</div>`+items.map(item=>{
    const w=item.abs/maxAbs*100, cls=item.abs>=5?'danger':item.abs>=3?'warn':'';
    const esc=item.label.replace(/'/g,"\\'");
    return `<div class="funnel-bar-row" onclick="${canDrill?`drillDown('${item.key}','${esc}')`:''}" style="cursor:${canDrill?'pointer':'default'}"><div class="funnel-label">${item.label}</div><div class="funnel-bar-bg"><div class="funnel-bar-fill ${cls}" style="width:${w}%"></div></div><div class="funnel-pct">${item.abs.toFixed(2)}%</div></div>`;
  }).join('');
  document.getElementById('funnel-hint').textContent=canDrill?'Clique em uma barra para detalhar':'';
}

function getItems(rows,key){
  return Object.entries(groupBy(rows,key)).map(([k,v])=>({key,label:k,abs:calcAbs(v)})).sort((a,b)=>b.abs-a.abs);
}
function drillDown(key,val){ funnelPath.push({key,val}); renderFunnel(); }
function drillUp(idx){ funnelPath=idx===-1?[]:funnelPath.slice(0,idx+1); renderFunnel(); }

function renderTableBody(){ tablePage=0; renderTablePage(); }

function renderTablePage(){
  const all=dedupeRows(filteredData);
  const start=tablePage*TABLE_PAGE_SIZE, end=start+TABLE_PAGE_SIZE;
  const slice=all.slice(start,end);
  document.getElementById('table-body').innerHTML=slice.map(r=>{
    const a=r.previsto>0?(r.ausencia/r.previsto*100):0;
    const bc=a>=5?'badge-danger':a>=2?'badge-warn':'badge-ok', bw=a>=3?'danger':a>=1?'warn':'';
    return `<tr><td>${r.name}</td><td>${r.team}</td><td>${r.supervisor}</td><td>${r.date}</td><td>${monthLabel(r.month)}</td><td>${r.previsto.toFixed(1)}h</td><td>${r.trabalhado.toFixed(1)}h</td><td>${r.ausencia.toFixed(1)}h</td><td><div class="abs-bar"><div class="abs-bar-bg"><div class="abs-bar-fill ${bw}" style="width:${Math.min(a/10*100,100)}%"></div></div><span class="badge ${bc}">${a.toFixed(2)}%</span></div></td></tr>`;
  }).join('');
  const total=all.length, pages=Math.ceil(total/TABLE_PAGE_SIZE);
  document.getElementById('table-info').textContent=`Exibindo ${start+1}–${Math.min(end,total)} de ${total} registros`;
  document.getElementById('btn-prev').disabled=tablePage===0;
  document.getElementById('btn-next').disabled=tablePage>=pages-1;
}

function tablePageChange(dir){
  const pages=Math.ceil(dedupeRows(filteredData).length/TABLE_PAGE_SIZE);
  tablePage=Math.max(0,Math.min(tablePage+dir,pages-1));
  renderTablePage();
}

function sortTable(col){
  const dir=sortDir[col]=!sortDir[col];
  const keys=['name','team','supervisor','date','month','previsto','trabalhado','ausencia'];
  if(col===8){ filteredData.sort((a,b)=>{ const av=a.previsto>0?a.ausencia/a.previsto:0,bv=b.previsto>0?b.ausencia/b.previsto:0; return dir?av-bv:bv-av; }); }
  else{ filteredData.sort((a,b)=>dir?(a[keys[col]]>b[keys[col]]?1:-1):(a[keys[col]]<b[keys[col]]?1:-1)); }
  tablePage=0; renderTablePage();
}

function exportCSV(){
  const rows=dedupeRows(filteredData);
  const header=['Colaborador','Equipe','Supervisor','Data','Mês','Previsto(h)','Trabalhado(h)','Ausência(h)','ABS%'];
  const lines=[header.join(';')];
  rows.forEach(r=>{
    const a=r.previsto>0?(r.ausencia/r.previsto*100):0;
    const fmt=n=>n.replace('.',',');
    lines.push([r.name,r.team,r.supervisor,r.date,monthLabel(r.month),fmt(r.previsto.toFixed(1)),fmt(r.trabalhado.toFixed(1)),fmt(r.ausencia.toFixed(1)),fmt(a.toFixed(2))].join(';'));
  });
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='absenteismo.csv'; a.click();
  URL.revokeObjectURL(url);
}

function showError(msg){
  document.getElementById('app').innerHTML=`<div class="error-box">⚠️ ${msg}</div>`;
}

}); // DOMContentLoaded
</script>
</body>
</html>
