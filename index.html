<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Gerencial BCR.CX</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:#fafafa;color:#18181b;font-size:14px;-webkit-font-smoothing:antialiased}
:root{--bg:#fafafa;--surface:#fff;--border:#e4e4e7;--border-subtle:#f4f4f5;--text:#18181b;--text-2:#71717a;--text-3:#a1a1aa;--brand:#2151E5;--data:#3b82f6;--data-dark:#1e40af;--data-light:#93c5fd;--warn:#f59e0b;--danger:#dc2626;--success:#16a34a;--blue1:#1A2A6C;--blue2:#3b82f6;--blue3:#3b82f6;--blue4:#93c5fd;--blue5:#eff6ff;--dark:#18181b;--mid:#71717a;--light:#a1a1aa}
.header{background:var(--surface);color:var(--text);padding:12px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border)}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-wrap img{height:28px;width:auto}
.header-divider{width:1px;height:20px;background:var(--border)}
.header-title{flex:initial;text-align:left}.header-title h1{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-0.01em}.header-title p{font-size:12px;color:var(--text-3);margin-top:1px}
.header-meta{font-size:12px;text-align:right;color:var(--text-3);margin-left:auto}
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.filter-group label{font-size:11px;font-weight:500;color:var(--text-2)}
.filter-group select,.filter-group input[type=date]{border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s ease}
.filter-group select:hover,.filter-group input[type=date]:hover{border-color:var(--text-3)}
.filter-group select:focus,.filter-group input[type=date]:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(24,24,27,.06)}
.btn-filter{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:500;height:35px;transition:opacity .15s ease}
.btn-filter:hover{opacity:.85}
.btn-reset{background:transparent;color:var(--text-2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;height:35px;transition:background .15s ease,border-color .15s ease}
.btn-reset:hover{background:var(--border-subtle);border-color:var(--text-3)}
.main{padding:20px 24px;display:flex;flex-direction:column;gap:16px;max-width:1600px;margin:0 auto;width:100%}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{background:var(--surface);border-radius:12px;padding:16px 18px;border:1px solid var(--border);transition:border-color .15s ease}
.kpi:hover{border-color:var(--text-3)}
.kpi-val{font-size:26px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-0.02em}
.kpi-label{font-size:12px;color:var(--text-2);margin-top:8px}
.kpi-sub{font-size:11px;color:var(--text-3);margin-top:3px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chart-card{background:var(--surface);border-radius:12px;padding:18px;border:1px solid var(--border)}
.chart-card.full{grid-column:1/-1}
.bar-accent{width:4px;height:16px;background:#2151E5;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.card-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:4px;letter-spacing:-0.01em}
.toggle-group{display:inline-flex;background:var(--border-subtle);border:none;border-radius:8px;padding:3px;gap:2px;overflow:visible}
.toggle-btn{background:transparent;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--text-2);font-weight:500;transition:color .15s ease,background .15s ease}
.toggle-btn:not(:last-child){border-right:none}
.toggle-btn:hover{color:var(--text)}
.toggle-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.legend-row{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;font-size:12px;color:var(--text-2)}
.legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px}
.funnel-card{background:var(--surface);border-radius:12px;padding:18px;border:1px solid var(--border)}
.funnel-wrap{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.funnel-level-title{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.funnel-bar-row{display:flex;align-items:center;gap:10px;padding:4px 8px;border-radius:8px;transition:background .12s ease}
.funnel-bar-row:hover{background:var(--border-subtle)}
.funnel-label{font-size:12px;color:var(--text);min-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.funnel-bar-bg{flex:1;height:14px;background:var(--border-subtle);border-radius:4px;overflow:hidden}
.funnel-bar-fill{height:100%;border-radius:4px;background:var(--data);transition:width .3s ease}
.funnel-bar-fill.warn{background:var(--warn)}.funnel-bar-fill.danger{background:var(--danger)}
.funnel-pct{font-size:12px;font-weight:600;color:var(--text);min-width:52px;text-align:right}
.funnel-breadcrumb{font-size:12px;color:var(--text-2);margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.funnel-breadcrumb span{color:var(--data-dark);cursor:pointer;font-weight:500}
.funnel-breadcrumb span:hover{text-decoration:underline}
.funnel-hint{font-size:11px;color:var(--text-3);margin-top:8px}
.table-card{background:var(--surface);border-radius:12px;padding:0;border:1px solid var(--border);overflow:hidden}
.table-card>div:first-child{padding:14px 18px;border-bottom:1px solid var(--border-subtle)}
.table-wrap{overflow-x:auto;max-height:380px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;background:var(--bg);color:var(--text-2);font-weight:500;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:11px;cursor:pointer;white-space:nowrap;transition:color .15s ease}
thead th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid var(--border-subtle);transition:background .12s ease}
tbody tr:hover{background:var(--bg)}
tbody td{padding:8px 14px;color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.badge-ok{background:transparent;color:#15803d}.badge-ok::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--success)}
.badge-warn{background:transparent;color:#b45309}.badge-warn::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--warn)}
.badge-danger{background:transparent;color:#b91c1c}.badge-danger::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--danger)}
.abs-bar{display:flex;align-items:center;gap:6px}
.abs-bar-bg{flex:1;height:5px;background:var(--border-subtle);border-radius:3px;overflow:hidden;min-width:60px}
.abs-bar-fill{height:100%;border-radius:3px;background:var(--data)}
.abs-bar-fill.warn{background:var(--warn)}.abs-bar-fill.danger{background:var(--danger)}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--text-2);font-size:14px}
.spinner{width:26px;height:26px;border:2.5px solid var(--border-subtle);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:16px 20px;color:#b91c1c;font-size:13px;margin:20px 24px}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-card{background:var(--surface);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;border:1px solid var(--border)}
.login-logo{display:flex;justify-content:center;margin-bottom:28px}
.login-logo img{height:44px;width:auto}
.login-title{font-size:19px;font-weight:600;color:var(--text);text-align:center;margin-bottom:4px;letter-spacing:-0.01em}
.login-sub{font-size:13px;color:var(--text-3);text-align:center;margin-bottom:28px}
.login-field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.login-field label{font-size:12px;font-weight:500;color:var(--text-2)}
.login-field input{border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s ease,box-shadow .15s ease}
.login-field input:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(24,24,27,.06)}
.btn-login{width:100%;background:var(--brand);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;margin-top:6px;transition:opacity .15s ease}
.btn-login:hover{opacity:.9}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;color:#b91c1c;font-size:13px;margin-top:12px;display:none}
.login-spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
/* USER CHIP */
.user-chip{display:flex;align-items:center;gap:8px;font-size:12px}
.user-chip span{color:var(--text-3)}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--text-2);border-radius:7px;padding:4px 11px;font-size:12px;cursor:pointer;transition:background .15s ease}
.btn-logout:hover{background:var(--border-subtle)}
/* EXEMPTION */
.badge-exemption{background:#dbeafe;color:#1e40af;border:none}
.badge-exempt-allday{background:#fef3c7;color:#92400e;border:none}
td.exempt-cell{background:#fffbeb;border-left:3px solid var(--warn)}
.exempt-tag{display:inline-flex;align-items:center;gap:3px;background:#dbeafe;color:#1e40af;border-radius:5px;padding:1px 7px;font-size:10px;font-weight:500;border:none;white-space:nowrap}
.exempt-tag.allday{background:#fef3c7;color:#92400e;border:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {

const SB_URL = 'https://toeelbrxxnlkvxkhewnw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvZWVsYnJ4eG5sa3Z4a2hld253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDI0NjUsImV4cCI6MjA5NTM3ODQ2NX0.7wYOQzcEOGlYlSG0cmSZDcwaH-dV5XjtVvBr_k4WdJE';
const TABLE  = 'absenteeism';
const TABLE_EX = 'exemptions';
const PAGE   = 5000;

// Supabase client
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('btn-login');
  const label    = document.getElementById('login-label');
  const spinner  = document.getElementById('login-spinner');

  errEl.style.display = 'none';
  if(!email || !password){ errEl.textContent='Preencha e-mail e senha.'; errEl.style.display='block'; return; }

  btn.disabled = true; label.style.display='none'; spinner.style.display='block';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  btn.disabled = false; label.style.display='block'; spinner.style.display='none';

  if(error){
    errEl.textContent = error.message.includes('Invalid login') ? 'E-mail ou senha incorretos.' : error.message;
    errEl.style.display = 'block';
    return;
  }
  showDashboard(data.user);
}

async function doLogout() {
  await supabase.auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div>Buscando dados do Supabase...</div>';
}

function showDashboard(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('user-email-display').textContent = user.email;
  init();
}

// Expõe funções usadas em onclick inline para o escopo global
window.applyFilters = applyFilters;
window.resetFilters = resetFilters;
window.setTrendMode = setTrendMode;
window.setAbsMode   = setAbsMode;
window.setHoursMode = setHoursMode;
window.setFunnelRoot= setFunnelRoot;
window.drillDown    = drillDown;
window.drillUp      = drillUp;
window.sortTable    = sortTable;
window.tablePageChange = tablePageChange;
window.exportCSV    = exportCSV;
window.setExDrillMode = setExDrillMode;
window.exDrillDown    = exDrillDown;
window.exDrillUp      = exDrillUp;
window.setExMatrixDrillMode = setExMatrixDrillMode;
window.exMatrixDrillDown    = exMatrixDrillDown;
window.exMatrixDrillUp      = exMatrixDrillUp;

// Button + Enter key listeners
document.getElementById('btn-login').addEventListener('click', doLogin);
['login-email','login-password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
});

// Check existing session on load
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if(session) {
    showDashboard(session.user);
  }
})();
// ─────────────────────────────────────────────────────────────────────────────

const parseTime  = t => { if(!t||t==='00:00')return 0; const[h,m]=t.split(':'); return+h+(+m/60); };
const allLeaders = l => l ? l.split(',').map(x=>x.trim()).filter(Boolean) : ['N/A'];
const monthKey   = d => d.slice(0,7);
const monthLabel = k => { const[y,m]=k.split('-'); return `${'JanFevMarAbrMaiJunJulAgoSetOutNovDez'.slice((+m-1)*3,(+m-1)*3+3)}/${y.slice(2)}`; };
const groupBy    = (arr,key) => arr.reduce((a,r)=>{ (a[r[key]]=a[r[key]]||[]).push(r); return a; },{});

const dedupeRows = rows => {
  const seen = new Set();
  return rows.filter(r => {
    const key = r.name+'|'+r.date;
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
};

const calcAbs = rows => {
  const u = dedupeRows(rows);
  const p = u.reduce((s,r)=>s+r.previsto,0);
  const a = u.reduce((s,r)=>s+r.ausencia,0);
  return p>0?+(a/p*100).toFixed(2):0;
};

let allData=[], filteredData=[], sortDir={};
let exemptionMap={}; // key: "name|date" → exemption row
let loadedDateStart='', loadedDateEnd='';
let absMode='team', hoursMode='team', trendMode='team', trendDrillMonth=null, funnelRoot='supervisor', funnelPath=[];
let chartAbs=null, chartHours=null, chartTrend=null, chartExAxis=null, chartExDrill=null, chartExMatrix=null;
let exAxisMode='status', exDrillMode='answered_by', exDrillPath=[], exMatrixDrillMode='answered_by', exMatrixDrillPath=[];
let tablePage=0;
const TABLE_PAGE_SIZE=100;

async function fetchAll(dateStart, dateEnd) {
  let rows=[], offset=0, total=null;
  const { data: { session } } = await supabase.auth.getSession();
  const token = session ? session.access_token : SB_KEY;
  while(true) {
    const headers = { apikey:SB_KEY, Authorization:`Bearer ${token}`, Range:`${offset}-${offset+PAGE-1}`, Prefer:'count=exact' };
    let url = `${SB_URL}/rest/v1/${TABLE}?select=*&order=extraction_date.asc`;
    if(dateStart) url += `&extraction_date=gte.${dateStart}`;
    if(dateEnd)   url += `&extraction_date=lte.${dateEnd}`;
    const res = await fetch(url, { headers });
    if(!res.ok) throw new Error(`Supabase error: ${res.status} ${res.statusText}`);
    if(total===null){ const cr=res.headers.get('Content-Range'); if(cr) total=parseInt(cr.split('/')[1])||null; }
    const page = await res.json();
    rows.push(...page);
    if(total!==null && rows.length>=total) break;
    if(page.length<PAGE) break;
    offset+=PAGE;
  }
  return rows;
}

async function fetchExemptions(dateStart, dateEnd) {
  let rows=[], offset=0, total=null;
  const { data: { session } } = await supabase.auth.getSession();
  const token = session ? session.access_token : SB_KEY;
  while(true) {
    const headers = { apikey:SB_KEY, Authorization:`Bearer ${token}`, Range:`${offset}-${offset+PAGE-1}`, Prefer:'count=exact' };
    let url = `${SB_URL}/rest/v1/${TABLE_EX}?select=*&order=date.asc`;
    if(dateStart) url += `&date=gte.${dateStart}`;
    if(dateEnd)   url += `&date=lte.${dateEnd}`;
    const res = await fetch(url, { headers });
    if(!res.ok) {
      const errBody = await res.text();
      console.error('exemptions fetch failed:', res.status, errBody);
      return {};
    }
    if(total===null){ const cr=res.headers.get('Content-Range'); if(cr) total=parseInt(cr.split('/')[1])||null; }
    const page = await res.json();
    rows.push(...page);
    if(total!==null && rows.length>=total) break;
    if(page.length<PAGE) break;
    offset+=PAGE;
  }
  console.log(`[exemptions] ${rows.length} registros carregados para ${dateStart} → ${dateEnd}`);
  // Build lookup map: "employee_name|date" → exemption row (first match, prefer all_day=sim)
  const map={};
  rows.forEach(ex => {
    const k=(ex.employee_name||'').trim()+'|'+(ex.date||'');
    if(!map[k] || (ex.all_day||'').toLowerCase()==='sim') map[k]=ex;
  });
  console.log(`[exemptions] ${Object.keys(map).length} chaves no mapa`);
  // Log primeiras 3 chaves para inspeção
  Object.keys(map).slice(0,3).forEach(k => console.log('[exemptions] chave:', k));
  return map;
}

function processRows(rows) {
  allData = [];
  let exHits = 0, exAllDay = 0;
  for(const r of rows) {
    const prev = parseTime(r.total_working_time);
    const trab = parseTime(r.total_worked_time);
    const ausOriginal = parseTime(r.total_missing_time);
    allLeaders(r.leaders).forEach(sup => {
      const exKey = r.name.trim()+'|'+r.extraction_date;
      const ex = exemptionMap[exKey] || null;
      const isAllDay = ex && (ex.all_day||'').toLowerCase()==='sim';
      const ausencia = isAllDay ? prev : ausOriginal;
      // Total abonado: all_day=sim → total_working_time; parcial → exemption_duration
      let abonado = 0;
      if(ex) {
        abonado = isAllDay ? prev : parseTime(ex.exemption_duration || '00:00');
      }
      if(ex) exHits++;
      if(isAllDay) exAllDay++;
      allData.push({
        name:r.name, team:r.cost_center, supervisor:sup,
        date:r.extraction_date, month:monthKey(r.extraction_date),
        previsto:prev, trabalhado:trab, ausencia:ausencia,
        abonado:abonado,
        exemption: ex
      });
    });
  }
  console.log(`[processRows] ${allData.length} linhas | ${exHits} com abono | ${exAllDay} all_day=sim`);
  allData.filter(r=>r.exemption).slice(0,3).forEach(r =>
    console.log(`[match] ${r.name} | ${r.date} | all_day:${r.exemption.all_day} | aus:${r.ausencia} | abonado:${r.abonado} | prev:${r.previsto}`)
  );
}

async function init() {
  const today=new Date(), y=today.getFullYear(), m=String(today.getMonth()+1).padStart(2,'0');
  const past30=new Date(today); past30.setDate(past30.getDate()-30);
  const py=past30.getFullYear(), pm=String(past30.getMonth()+1).padStart(2,'0'), pd=String(past30.getDate()).padStart(2,'0');
  const defaultStart=`${py}-${pm}-${pd}`, defaultEnd=today.toISOString().slice(0,10);
  try {
    const [rows, exMap] = await Promise.all([
      fetchAll(defaultStart, defaultEnd),
      fetchExemptions(defaultStart, defaultEnd)
    ]);
    exemptionMap = exMap;
    processRows(rows);
    if(!allData.length){ showError('Nenhum registro encontrado para o período selecionado.'); return; }
    filteredData=[...allData];
    loadedDateStart=defaultStart; loadedDateEnd=defaultEnd;
    document.getElementById('f-date-start').value=defaultStart;
    document.getElementById('f-date-end').value=defaultEnd;
    document.getElementById('filters-bar').style.display='flex';
    populateFilters(); buildLayout(); renderAll();
  } catch(e){ showError(`Erro ao conectar ao Supabase: ${e.message}`); }
}

async function applyFilters() {
  const sup=document.getElementById('f-sup').value, team=document.getElementById('f-team').value,
        emp=document.getElementById('f-emp').value, ds=document.getElementById('f-date-start').value,
        de=document.getElementById('f-date-end').value;

  if(ds!==loadedDateStart || de!==loadedDateEnd) {
    document.getElementById('app').innerHTML='<div class="loading"><div class="spinner"></div>Atualizando...</div>';
    try {
      const [rows, exMap] = await Promise.all([
        fetchAll(ds, de),
        fetchExemptions(ds, de)
      ]);
      exemptionMap = exMap;
      processRows(rows);
      loadedDateStart=ds; loadedDateEnd=de;
      funnelPath=[]; populateFilters(sup,team,emp); buildLayout();
    } catch(e){ showError(`Erro ao buscar dados: ${e.message}`); return; }
  }

  filteredData=allData.filter(d=>{
    if(sup  && d.supervisor!==sup)  return false;
    if(team && d.team!==team)       return false;
    if(emp  && d.name!==emp)        return false;
    return true;
  });
  funnelPath=[]; renderAll();
}

function resetFilters() {
  ['f-sup','f-team','f-emp'].forEach(id=>document.getElementById(id).value='');
  const today=new Date(), y=today.getFullYear(), m=String(today.getMonth()+1).padStart(2,'0');
  document.getElementById('f-date-start').value=`${y}-${m}-01`;
  document.getElementById('f-date-end').value=today.toISOString().slice(0,10);
  applyFilters();
}

function populateFilters(selSup='',selTeam='',selEmp='') {
  const fill=(id,opts,ph,sel)=>{
    const s=document.getElementById(id);
    s.innerHTML=`<option value="">${ph}</option>`;
    opts.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; if(v===sel)o.selected=true; s.appendChild(o); });
  };
  fill('f-sup',  [...new Set(allData.map(d=>d.supervisor))].sort(),'Todos os supervisores',selSup);
  fill('f-team', [...new Set(allData.map(d=>d.team))].sort(),      'Todas as equipes',     selTeam);
  fill('f-emp',  [...new Set(allData.map(d=>d.name))].sort(),      'Todos',                selEmp);
}

function renderKPIs(){
  const d=dedupeRows(filteredData);
  const totP=d.reduce((s,r)=>s+r.previsto,0), totT=d.reduce((s,r)=>s+r.trabalhado,0), totA=d.reduce((s,r)=>s+r.ausencia,0);
  const absG=totP>0?(totA/totP*100):0, pct=totP>0?(totT/totP*100):0;
  const regFalta=d.filter(r=>r.ausencia>0||(r.exemption&&(r.exemption.all_day||'').toLowerCase()==='sim')).length;
  // Total Abonos e Total Abonado: exclui apenas Pendente e Reprovada
  const excluidos = new Set(['Pendente','Reprovada']);
  const aprovados=d.filter(r=>r.exemption && !excluidos.has((r.exemption.solicitation_status||'').trim()));
  const totAbonos=aprovados.length;
  const totAbonado=aprovados.reduce((s,r)=>s+(r.abonado||0),0);
  // Formata: valor principal = horas, subtexto ao lado = minutos
  const fmtKpi = h => {
    const hh=Math.floor(h), mm=Math.round((h-hh)*60);
    return {main:`${hh}h`, sub2: mm>0?`${mm}min`:''};
  };
  const fmtSimple = h => { const hh=Math.floor(h),mm=Math.round((h-hh)*60); return mm>0?`${hh}h ${String(mm).padStart(2,'0')}min`:`${hh}h`; };
  const mkHoraKpi=(label,h,sub)=>{
    const {main,sub2}=fmtKpi(h);
    return `<div class="kpi"><div class="kpi-val" style="display:flex;align-items:baseline;gap:5px">${main}${sub2?`<span style="font-size:13px;font-weight:400;color:var(--mid)">${sub2}</span>`:''}</div><div class="kpi-label">${label}</div><div class="kpi-sub">${sub}</div></div>`;
  };
  const mkKpi=(label,val,sub)=>`<div class="kpi"><div class="kpi-val">${val}</div><div class="kpi-label">${label}</div><div class="kpi-sub">${sub}</div></div>`;
  document.getElementById('kpi-row').innerHTML=[
    mkKpi('Colaboradores',   new Set(filteredData.map(r=>r.name)).size, 'no período'),
    mkHoraKpi('Total previsto',   totP, 'horas esperadas'),
    mkHoraKpi('Total trabalhado', totT, pct.toFixed(1)+'% do previsto'),
    mkHoraKpi('Total ausências',  totA, 'horas faltantes'),
    mkKpi('ABS Global',      absG.toFixed(2)+'%', 'índice de absenteísmo'),
    mkKpi('Reg. c/ falta',   regFalta, 'registros com ausência'),
    mkKpi('Total Abonos',    totAbonos, 'registros abonados'),
    mkHoraKpi('Total Abonado', totAbonado, 'horas abonadas'),
  ].join('');
}

function setTrendMode(m){
  trendMode=m; trendDrillMonth=null;

    :'Evolução — ABS (*) por Colaborador — Top 10 maiores';

function renderTrendChart(){
  const groupKey=trendMode==='team'?'team':'name';
  const colors=['#3b82f6','#dc2626','#16a34a','#f59e0b','#8b5cf6','#0891b2','#db2777','#78716c','#475569','#65a30d'];
  let labels,datasets,hint='',breadcrumb='';

  if(trendDrillMonth){
    const dayData=filteredData.filter(d=>d.month===trendDrillMonth);
    const days=[...new Set(dayData.map(d=>d.date))].sort();
    const groups=Object.entries(groupBy(dayData,groupKey)).map(([k,v])=>({k,abs:calcAbs(v)})).sort((a,b)=>b.abs-a.abs).slice(0,10).map(x=>x.k);
    labels=days.map(d=>{ const[,mo,dy]=d.split('-'); return `${dy}/${mo}`; });
    datasets=groups.map((g,i)=>({
      label:g, borderColor:colors[i%10], backgroundColor:colors[i%10],
      borderWidth:2.5, pointRadius:4, fill:false, tension:.3, spanGaps:true,
      data:days.map(day=>{ const r=dayData.filter(x=>x[groupKey]===g&&x.date===day); return r.length?calcAbs(r):null; })
    }));
    breadcrumb=`${monthLabel(trendDrillMonth)} › dias`;
    hint='Clique aqui para voltar para o mês';
    document.getElementById('trend-hint').onclick=()=>{ trendDrillMonth=null; renderTrendChart(); };
  } else {
    const months=[...new Set(filteredData.map(d=>d.month))].sort();
    const groups=Object.entries(groupBy(filteredData,groupKey)).map(([k,v])=>({k,abs:calcAbs(v)})).sort((a,b)=>b.abs-a.abs).slice(0,10).map(x=>x.k);
    labels=months.map(monthLabel);
    datasets=groups.map((g,i)=>({
      label:g, borderColor:colors[i%10], backgroundColor:colors[i%10],
      borderWidth:2.5, pointRadius:5, fill:false, tension:.3, spanGaps:true,
      data:months.map(mo=>{ const r=filteredData.filter(d=>d[groupKey]===g&&d.month===mo); return r.length?calcAbs(r):null; })
    }));
    hint='Clique em um ponto para ver a evolução diária';
    document.getElementById('trend-hint').onclick=null;
  }

  document.getElementById('trend-breadcrumb').textContent=breadcrumb;
  document.getElementById('trend-hint').textContent=hint;
  document.getElementById('trend-legend').innerHTML=datasets.map((d,i)=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:18px;height:3px;background:${colors[i%10]};display:inline-block;border-radius:2px"></span><span style="font-size:12px;color:var(--mid)">${d.label}</span></span>`).join('');

  if(chartTrend)chartTrend.destroy();
  chartTrend=new Chart(document.getElementById('chartTrend'),{
    type:'line', data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      onClick:(evt,els)=>{ if(!trendDrillMonth&&els.length){ const months=[...new Set(filteredData.map(d=>d.month))].sort(); trendDrillMonth=months[els[0].index]; renderTrendChart(); } },
      scales:{ y:{title:{display:true,text:'ABS %'},min:0,grid:{color:'#f4f4f5'},ticks:{callback:v=>v+'%'}}, x:{grid:{color:'#f4f4f5'}} }
    }
  });
}

function renderChartAbs(){

      indexAxis:'y',responsive:true,maintainAspectRatio:false,

function renderChartHours(){
  const key=hoursMode==='team'?'team':'name';
  const e=Object.entries(groupBy(filteredData,key)).map(([k,v])=>{
    const u=dedupeRows(v);
    return {k, prev:u.reduce((s,r)=>s+r.previsto,0), trab:u.reduce((s,r)=>s+r.trabalhado,0), abs:calcAbs(v)};
  }).sort((a,b)=>b.abs-a.abs);
  const labels=e.map(x=>hoursMode==='emp'?x.k.split(' ').slice(0,2).join(' '):x.k);
  const prev=e.map(x=>+x.prev.toFixed(1)), trab=e.map(x=>+x.trab.toFixed(1));
  const maxVal=Math.max(...prev,...trab,1)*1.25;
  const wrap=document.getElementById('chart-hours-wrap');
  wrap.style.height=Math.max(200,labels.length*(hoursMode==='emp'?20:30)+60)+'px';
  if(chartHours)chartHours.destroy();
  const hoursLabelPlugin={id:'hoursLabel',afterDatasetsDraw(chart){
    const{ctx}=chart;
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      if(meta.hidden) return;
      meta.data.forEach((bar,i)=>{
        const val=ds.data[i];
        if(!val) return;
        ctx.save();
        ctx.fillStyle='#71717a';ctx.font=`500 ${hoursMode==='emp'?10:11}px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif`;
        ctx.textAlign='left';ctx.textBaseline='middle';
        ctx.fillText(val+'h', bar.x+4, bar.y);
        ctx.restore();
      });
    });
  }};
  chartHours=new Chart(document.getElementById('chartHours'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Previsto',data:prev,backgroundColor:'#1e40af',borderRadius:3},
      {label:'Trabalhado',data:trab,backgroundColor:'#93c5fd',borderRadius:3}
    ]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{display:false,max:maxVal},
        y:{grid:{display:false},ticks:{font:{size:hoursMode==='emp'?10:12}}}
      }
    },
    plugins:[hoursLabelPlugin]
  });
}

function renderFunnel(){
  let rows=filteredData;
  funnelPath.forEach(s=>{ rows=rows.filter(r=>r[s.key]===s.val); });
  const depth=funnelPath.length;
  let levelLabel,items;
  if(funnelRoot==='supervisor'){
    if(depth===0){levelLabel='Supervisor';items=getItems(rows,'supervisor');}
    else if(depth===1){levelLabel='Equipe';items=getItems(rows,'team');}
    else{levelLabel='Colaborador';items=getItems(rows,'name');}
  } else if(funnelRoot==='team'){
    if(depth===0){levelLabel='Equipe';items=getItems(rows,'team');}
    else{levelLabel='Colaborador';items=getItems(rows,'name');}
  } else {
    levelLabel='Colaborador'; items=getItems(rows,'name');
  }
  const maxAbs=Math.max(...items.map(i=>i.abs),0.01);
  const canDrill=(funnelRoot==='supervisor'&&depth<2)||(funnelRoot==='team'&&depth<1);
  const bc=document.getElementById('funnel-breadcrumb');
  bc.innerHTML='<span onclick="drillUp(-1)">Início</span>';
  funnelPath.forEach((s,i)=>{ bc.innerHTML+=` › <span onclick="drillUp(${i})">${s.val}</span>`; });
  if(funnelPath.length) bc.innerHTML+=` › <strong>${levelLabel}</strong>`;
  document.getElementById('funnel-wrap').innerHTML=`<div class="funnel-level-title">${levelLabel}</div>`+items.map(item=>{
    const w=item.abs/maxAbs*100, cls=item.abs>=5?'danger':item.abs>=3?'warn':'';
    const esc=item.label.replace(/'/g,"\\'");
    return `<div class="funnel-bar-row" onclick="${canDrill?`drillDown('${item.key}','${esc}')`:''}" style="cursor:${canDrill?'pointer':'default'}"><div class="funnel-label">${item.label}</div><div class="funnel-bar-bg"><div class="funnel-bar-fill ${cls}" style="width:${w}%"></div></div><div class="funnel-pct">${item.abs.toFixed(2)}%</div></div>`;
  }).join('');
  document.getElementById('funnel-hint').textContent=canDrill?'Clique em uma barra para detalhar':'';
}

function getItems(rows,key){
  return Object.entries(groupBy(rows,key)).map(([k,v])=>({key,label:k,abs:calcAbs(v)})).sort((a,b)=>b.abs-a.abs);
}
function drillDown(key,val){ funnelPath.push({key,val}); renderFunnel(); }
function drillUp(idx){ funnelPath=idx===-1?[]:funnelPath.slice(0,idx+1); renderFunnel(); }

function renderTableBody(){ tablePage=0; renderTablePage(); }

function renderTablePage(){
  const all=dedupeRows(filteredData);
  const start=tablePage*TABLE_PAGE_SIZE, end=start+TABLE_PAGE_SIZE;
  const slice=all.slice(start,end);
  document.getElementById('table-body').innerHTML=slice.map(r=>{
    const a=r.previsto>0?(r.ausencia/r.previsto*100):0;
    const bc=a>=5?'badge-danger':a>=2?'badge-warn':'badge-ok', bw=a>=3?'danger':a>=1?'warn':'';
    const ex=r.exemption;
    const isAllDay=ex&&(ex.all_day||'').toLowerCase()==='sim';
    // Exemption columns
    const exType  = ex?(ex.exemption_type||'—'):'—';
    const exStatus= ex?(ex.status||'—'):'—';
    const exSol   = ex?(ex.solicitation_status||'—'):'—';
    const exBy    = ex?(ex.answered_by||'—'):'—';
    const exAllDay= ex?(ex.all_day||'—'):'—';
    const exStart = isAllDay?'—':(ex?(ex.start_time||'—'):'—');
    const exEnd   = isAllDay?'—':(ex?(ex.end_time||'—'):'—');
    const exAttach= ex?((ex.has_attachment===true||ex.has_attachment==='true'||ex.has_attachment==='sim'||ex.has_attachment==='Sim')?'✔ Sim':'✘ Não'):'—';
    const exObs   = ex?(ex.observation||'—'):'—';
    // Total abonado formatado
    const abonadoH = r.abonado||0;
    const abonadoHH = Math.floor(abonadoH), abonadoMM = Math.round((abonadoH-abonadoHH)*60);
    const abonadoFmt = abonadoH>0 ? (abonadoMM>0?`${abonadoHH}h ${String(abonadoMM).padStart(2,'0')}min`:`${abonadoHH}h`) : '—';
    const abonadoTag = abonadoH>0 ? `<span class="badge badge-exemption">${abonadoFmt}</span>` : '—';
    // Row highlight class when exemption present
    const rowClass= isAllDay?'style="background:#fffbeb"':'';
    // ABS cell tag
    const absTag = isAllDay?`<span class="exempt-tag allday">Abono Dia</span>`
                  :ex?`<span class="exempt-tag">Abono</span>`:'';
    return `<tr ${rowClass}>
      <td>${r.name}</td>
      <td>${r.team}</td>
      <td>${r.supervisor}</td>
      <td>${r.date}</td>
      <td>${monthLabel(r.month)}</td>
      <td>${r.previsto.toFixed(1)}h</td>
      <td>${r.trabalhado.toFixed(1)}h</td>
      <td>${r.ausencia.toFixed(1)}h</td>
      <td><div class="abs-bar"><div class="abs-bar-bg"><div class="abs-bar-fill ${bw}" style="width:${Math.min(a/10*100,100)}%"></div></div><span class="badge ${bc}">${a.toFixed(2)}%</span>${absTag}</div></td>
      <td>${abonadoTag}</td>
      <td>${exType}</td>
      <td>${exStatus}</td>
      <td>${exSol}</td>
      <td>${exBy}</td>
      <td>${exAllDay}</td>
      <td>${exStart}</td>
      <td>${exEnd}</td>
      <td>${exAttach}</td>
      <td style="max-width:180px;white-space:normal;word-break:break-word">${exObs}</td>
    </tr>`;
  }).join('');
  const total=all.length, pages=Math.ceil(total/TABLE_PAGE_SIZE);
  document.getElementById('table-info').textContent=`Exibindo ${start+1}–${Math.min(end,total)} de ${total} registros`;
  document.getElementById('btn-prev').disabled=tablePage===0;
  document.getElementById('btn-next').disabled=tablePage>=pages-1;
}

function tablePageChange(dir){
  const pages=Math.ceil(dedupeRows(filteredData).length/TABLE_PAGE_SIZE);
  tablePage=Math.max(0,Math.min(tablePage+dir,pages-1));
  renderTablePage();
}

function sortTable(col){
  const dir=sortDir[col]=!sortDir[col];
  const keys=['name','team','supervisor','date','month','previsto','trabalhado','ausencia'];
  if(col===8){ filteredData.sort((a,b)=>{ const av=a.previsto>0?a.ausencia/a.previsto:0,bv=b.previsto>0?b.ausencia/b.previsto:0; return dir?av-bv:bv-av; }); }
  else{ filteredData.sort((a,b)=>dir?(a[keys[col]]>b[keys[col]]?1:-1):(a[keys[col]]<b[keys[col]]?1:-1)); }
  tablePage=0; renderTablePage();
}

function exportCSV(){
  const rows=dedupeRows(filteredData);
  const header=['Colaborador','Equipe','Supervisor','Data','Mês','Previsto(h)','Trabalhado(h)','Ausência(h)','ABS%','Total Abonado',
                'Tipo de Abono','Status','Solicitação','Aprovada por','Dia todo','Horário Início Abono','Horário Fim Abono','Possui Anexo','Observação'];
  const lines=[header.join(';')];
  rows.forEach(r=>{
    const a=r.previsto>0?(r.ausencia/r.previsto*100):0;
    const fmt=n=>n.replace('.',',');
    const ex=r.exemption;
    const isAllDay=ex&&(ex.all_day||'').toLowerCase()==='sim';
    const abonadoH=r.abonado||0;
    const abonadoHH=Math.floor(abonadoH), abonadoMM=Math.round((abonadoH-abonadoHH)*60);
    const abonadoFmt=abonadoH>0?(abonadoMM>0?`${abonadoHH}h ${String(abonadoMM).padStart(2,'0')}min`:`${abonadoHH}h`):'';
    lines.push([
      r.name, r.team, r.supervisor, r.date, monthLabel(r.month),
      fmt(r.previsto.toFixed(1)), fmt(r.trabalhado.toFixed(1)), fmt(r.ausencia.toFixed(1)), fmt(a.toFixed(2)),
      abonadoFmt,
      ex?(ex.exemption_type||''):'',
      ex?(ex.status||''):'',
      ex?(ex.solicitation_status||''):'',
      ex?(ex.answered_by||''):'',
      ex?(ex.all_day||''):'',
      isAllDay?'':(ex?(ex.start_time||''):''),
      isAllDay?'':(ex?(ex.end_time||''):''),
      ex?((ex.has_attachment===true||ex.has_attachment==='true'||ex.has_attachment==='sim'||ex.has_attachment==='Sim')?'Sim':'Não'):'',
      ex?(ex.observation||''):''
    ].join(';'));
  });
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='absenteismo.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── HELPERS para gráficos de abono ────────────────────────────────────────────
function getExemptions() {
  const seen = new Set();
  const result = [];
  for(const r of filteredData) {
    if(!r.exemption) continue;
    const key = r.name+'|'+r.date;
    if(seen.has(key)) continue;
    seen.add(key);
    result.push(r);
  }
  return result;
}

const fmtH = h => {
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  return mm>0?`${hh}h${String(mm).padStart(2,'0')}m`:`${hh}h`;
};

// Plugin inline para mostrar valor no fim da barra
const barLabelPlugin = {
  id:'barLabel',
  afterDatasetsDraw(chart){
    const {ctx}=chart;
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      if(meta.hidden) return;
      meta.data.forEach((bar,i)=>{
        const val=ds.data[i];
        if(!val) return;
        const label=ds.label==='Horas abonadas'?fmtH(val):val+' reg.';
        ctx.save();
        ctx.fillStyle='#71717a';
        ctx.font='500 11px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
        ctx.textAlign='left';
        ctx.textBaseline='middle';
        ctx.fillText(label, bar.x+4, bar.y);
        ctx.restore();
      });
    });
  }
};

// ── GRÁFICO 1: drill down tabela mini-barras ──────────────────────────────────
const DRILL_SEQUENCES = {
  'answered_by':   ['answered_by','team_name','employee_name','exemption_type','status','observation'],
  'team_name':     ['team_name','employee_name','exemption_type','status','observation'],
  'employee_name': ['employee_name','exemption_type','status','observation']
};
const DRILL_LABELS = {
  'answered_by':'Supervisor','team_name':'Equipe','employee_name':'Colaborador',
  'exemption_type':'Tipo de Abono','status':'Status','observation':'Observação'
};
const EXCLUIDOS_SOL = new Set(['Pendente','Reprovada']);

function isAbonado(r){
  return r.exemption && !EXCLUIDOS_SOL.has((r.exemption.solicitation_status||'').trim());
}

function setExDrillMode(m){
  exDrillMode=m; exDrillPath=[];
  ['answered_by','team_name','employee_name'].forEach(k=>{
    document.getElementById('ex-drill-btn-'+k).classList.toggle('active',m===k);
  });
  document.getElementById('ex-drill-title').textContent='Abonos — Drill Down ('+DRILL_LABELS[m]+')';
  renderExDrillChart();
}

function exDrillDown(val){
  exDrillPath.push(val);
  renderExDrillChart();
}

function exDrillUp(idx){
  exDrillPath = idx===-1 ? [] : exDrillPath.slice(0,idx+1);
  renderExDrillChart();
}

function renderExDrillChart(){
  const seq = DRILL_SEQUENCES[exDrillMode];
  const depth = exDrillPath.length;
  const currentKey = seq[Math.min(depth, seq.length-1)];
  const canDrill = depth < seq.length-1;

  let exRows = getExemptions();
  exDrillPath.forEach((val,i) => {
    const fk = seq[i];
    exRows = exRows.filter(r => (r.exemption[fk]||'N/A').trim()===val);
  });

  const grouped = {};
  exRows.forEach(r => {
    const cat = (r.exemption[currentKey]||'N/A').trim() || 'N/A';
    if(!grouped[cat]) grouped[cat]={count:0, horas:0};
    grouped[cat].count++;
    grouped[cat].horas += isAbonado(r)?(r.abonado||0):0;
  });
  const sorted = Object.entries(grouped).sort((a,b)=>b[1].count-a[1].count);
  const maxR = Math.max(...sorted.map(([,v])=>v.count),1);
  const maxH = Math.max(...sorted.map(([,v])=>v.horas),1);

  const bc = document.getElementById('ex-drill-breadcrumb');
  bc.innerHTML = '<span onclick="exDrillUp(-1)" style="color:var(--blue2);cursor:pointer;font-weight:600">Início</span>';
  exDrillPath.forEach((v,i)=>{
    bc.innerHTML += ` › <span onclick="exDrillUp(${i})" style="color:var(--blue2);cursor:pointer;font-weight:600">${v.length>20?v.slice(0,20)+'…':v}</span>`;
  });
  if(exDrillPath.length) bc.innerHTML += ` › <strong>${DRILL_LABELS[currentKey]||currentKey}</strong>`;
  document.getElementById('ex-drill-hint').textContent = canDrill ? 'Clique em uma linha para detalhar' : '';

  // Indicador de camadas disponíveis
  const seqLabels = seq.map(k => DRILL_LABELS[k]||k);
  const drillPathIndicator = seqLabels.map((l,i) => {
    const active = i === depth;
    const done   = i < depth;
    return `<span style="font-size:10px;padding:1px 6px;border-radius:10px;white-space:nowrap;
      background:${active?'#18181b':done?'#eff6ff':'#f4f4f5'};
      color:${active?'#fff':done?'#1e40af':'#a1a1aa'};
      font-weight:${active?'600':'400'}">${l}</span>`;
  }).join('<span style="font-size:10px;color:#ccc;margin:0 1px">›</span>');

  const wrap = document.getElementById('chart-ex-drill-wrap');
  const rows = sorted.map(([cat,v])=>{
    const wR = Math.round(v.count/maxR*100);
    const wH = Math.round(v.horas/maxH*100);
    const fmtHoras = v.horas>0 ? fmtH(v.horas) : '—';
    const esc = cat.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    const cursor = canDrill ? 'pointer' : 'default';
    const hover = canDrill ? `onmouseenter="this.style.background='#fafafa'" onmouseleave="this.style.background=''"` : '';
    return `<div ${hover} onclick="${canDrill?`exDrillDown('${esc}')`:''}\"
      style="display:grid;grid-template-columns:160px 1fr 52px 1fr 52px;gap:4px 6px;align-items:center;padding:5px 6px;border-radius:6px;cursor:${cursor}">
      <div style="font-size:12px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px" title="${esc}">${cat}</div>
      <div style="display:flex;align-items:center;gap:4px">
        <div style="flex:1;background:#f4f4f5;border-radius:3px;height:10px;overflow:hidden"><div style="width:${wR}%;height:100%;background:#1e40af;border-radius:3px"></div></div>
        <div style="font-size:11px;color:var(--mid);white-space:nowrap;min-width:42px">${v.count} reg.</div>
      </div>
      <div></div>
      <div style="display:flex;align-items:center;gap:4px">
        <div style="flex:1;background:#f4f4f5;border-radius:3px;height:10px;overflow:hidden"><div style="width:${wH}%;height:100%;background:#93c5fd;border-radius:3px"></div></div>
        <div style="font-size:11px;color:var(--mid);white-space:nowrap;min-width:42px">${fmtHoras}</div>
      </div>
      <div></div>
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:6px 6px 8px;border-bottom:1px solid var(--border);margin-bottom:4px">
      ${drillPathIndicator}
    </div>
    <div style="display:grid;grid-template-columns:160px 1fr 52px 1fr 52px;gap:4px 6px;padding:2px 6px 6px;font-size:11px;color:var(--text-2);font-weight:500">
      <div>${DRILL_LABELS[currentKey]||currentKey}</div><div colspan="2">Registros</div><div></div><div colspan="2">Horas Abonadas</div>
    </div>
    ${rows}`;
}

// ── GRÁFICO 2: Matriz ─────────────────────────────────────────────────────────
const MATRIX_SEQUENCES = {
  'answered_by':   ['answered_by','employee_name','status','observation'],
  'employee_name': ['employee_name','status','observation'],
  'status':        ['status','observation']
};
const MATRIX_LABELS = {
  'answered_by':'Supervisor','employee_name':'Colaborador',
  'status':'Status','observation':'Observação'
};

function setExMatrixDrillMode(m){
  exMatrixDrillMode=m; exMatrixDrillPath=[];
  ['answered_by','employee_name','status'].forEach(k=>{
    document.getElementById('ex-matrix-btn-'+k).classList.toggle('active',m===k);
  });
  renderExMatrixChart();
}

function exMatrixDrillDown(val){
  exMatrixDrillPath.push(val);
  renderExMatrixChart();
}

function exMatrixDrillUp(idx){
  exMatrixDrillPath = idx===-1 ? [] : exMatrixDrillPath.slice(0,idx+1);
  renderExMatrixChart();
}

function renderExMatrixChart(){
  const seq = MATRIX_SEQUENCES[exMatrixDrillMode];
  const depth = exMatrixDrillPath.length;
  const currentKey = seq[Math.min(depth, seq.length-1)];
  const canDrill = depth < seq.length-1;

  let exRows = getExemptions();
  exMatrixDrillPath.forEach((val,i) => {
    const fk = seq[i];
    exRows = exRows.filter(r => (r.exemption[fk]||'N/A').trim()===val);
  });

  // Colunas: solicitation_status únicos (sem NULL)
  const colSet = new Set();
  exRows.forEach(r => {
    const sol = (r.exemption.solicitation_status||'').trim();
    if(sol) colSet.add(sol);
  });
  const cols = [...colSet].sort();

  // Linhas: currentKey
  const rowMap = {};
  exRows.forEach(r => {
    const rowKey = (r.exemption[currentKey]||'N/A').trim() || 'N/A';
    const sol = (r.exemption.solicitation_status||'').trim();
    if(!rowMap[rowKey]) rowMap[rowKey] = {_total:{count:0,horas:0}};
    cols.forEach(c => { if(!rowMap[rowKey][c]) rowMap[rowKey][c]={count:0,horas:0}; });
    if(sol && rowMap[rowKey][sol]){
      rowMap[rowKey][sol].count++;
      rowMap[rowKey][sol].horas += isAbonado(r)?(r.abonado||0):0;
    }
    rowMap[rowKey]._total.count++;
    rowMap[rowKey]._total.horas += isAbonado(r)?(r.abonado||0):0;
  });

  const rowsSorted = Object.entries(rowMap).sort((a,b)=>b[1]._total.count-a[1]._total.count);

  const bc = document.getElementById('ex-matrix-breadcrumb');
  bc.innerHTML = '<span onclick="exMatrixDrillUp(-1)" style="color:var(--blue2);cursor:pointer;font-weight:600">Início</span>';
  exMatrixDrillPath.forEach((v,i)=>{
    bc.innerHTML += ` › <span onclick="exMatrixDrillUp(${i})" style="color:var(--blue2);cursor:pointer;font-weight:600">${v.length>18?v.slice(0,18)+'…':v}</span>`;
  });
  if(exMatrixDrillPath.length) bc.innerHTML += ` › <strong>${MATRIX_LABELS[currentKey]||currentKey}</strong>`;
  document.getElementById('ex-matrix-hint').textContent = canDrill ? 'Clique em uma linha para detalhar' : '';

  const colW = 80;
  const hdrCols = cols.map(c=>`<th style="min-width:${colW}px;text-align:center;padding:6px 8px;background:var(--bg);color:var(--text-2);font-size:11px;font-weight:500;white-space:nowrap">${c}</th>`).join('');
  const bodyRows = rowsSorted.map(([rk,rv])=>{
    const esc = rk.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    const cursor = canDrill ? 'pointer' : 'default';
    const cells = cols.map(c=>{
      const cv = rv[c]||{count:0,horas:0};
      const bg = cv.count>0?'#eff6ff':'';
      return `<td style="text-align:center;padding:5px 8px;background:${bg};font-size:11px">
        ${cv.count>0?`<div style="font-weight:600;color:var(--dark)">${cv.count}</div><div style="color:var(--mid);font-size:10px">${fmtH(cv.horas)}</div>`:'<span style="color:#ccc">—</span>'}
      </td>`;
    }).join('');
    return `<tr onclick="${canDrill?`exMatrixDrillDown('${esc}')`:''}" style="cursor:${cursor};border-bottom:1px solid var(--border)"
      onmouseenter="this.style.background='#fafafa'" onmouseleave="this.style.background=''">
      <td style="padding:6px 10px;font-size:12px;color:var(--dark);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc}">${rk}</td>
      ${cells}
      <td style="text-align:center;padding:5px 10px;font-size:11px;background:#fafafa;font-weight:600;color:var(--dark)">${rv._total.count}<div style="color:var(--mid);font-size:10px;font-weight:400">${fmtH(rv._total.horas)}</div></td>
    </tr>`;
  }).join('');

  document.getElementById('ex-matrix-wrap').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:auto">
      <thead><tr>
        <th style="padding:6px 10px;background:var(--bg);color:var(--text-2);font-size:11px;font-weight:500;text-align:left;white-space:nowrap">${MATRIX_LABELS[currentKey]||currentKey}</th>
        ${hdrCols}
        <th style="min-width:70px;text-align:center;padding:6px 8px;background:var(--border-subtle);color:var(--text-2);font-size:11px;font-weight:500">Total</th>
      </tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>`;
}
